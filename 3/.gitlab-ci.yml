stages:
  - build
  - style
  - test
  - deploy

build:
  stage: build
  script:
    - cd src/part2/cat && make s21_cat
    - cd ../grep && make s21_grep 
  artifacts:
    paths:
      - src/part2/cat/s21_cat
      - src/part2/grep/s21_grep
    expire_in: 30 days

style_check:
  stage: style
  script:
    - echo "Checking code style with clang-format..."
    - cd src/part2
    - clang-format -Werror --style=Google -n cat/*.c cat/*.h grep/*.c grep/*.h
    - echo "Style check passed!"

test_cat:
  stage: test
  script:
    - cd src/part2/cat
    - chmod +x tests.sh
    - bash tests.sh
  needs:
    - build
    - style_check

test_grep:
  stage: test
  script:
    - cd src/part2/grep
    - chmod +x tests.sh
    - bash tests.sh
  needs:
    - build
    - style_check

deploy:
  stage: deploy
  when: manual
  script:
    - bash deploy.sh
  only:
    - develop

notify:
  stage: .post
  script:
    - bash notify.sh
  when: always
